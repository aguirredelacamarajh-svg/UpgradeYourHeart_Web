<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 120">
  <!-- Heart Icon with Pulse - More spacing and wider aspect -->
  <g transform="translate(15, 10) scale(1.6)">
    <path d="M40 20 C40 10 30 10 25 20 C20 10 10 10 10 20 C10 35 25 50 25 50 C25 50 40 35 40 20" 
          fill="none" stroke="#c41230" stroke-width="2.2" stroke-linecap="round" />
    <path d="M5 30 L15 30 L18 20 L22 40 L25 5 L28 45 L32 30 L45 30" 
          fill="none" stroke="#c41230" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  
  <!-- Text Part - Moved further right to avoid crowding and increased letter spacing -->
  <text x="115" y="55" font-family="'Outfit', sans-serif" font-weight="600" font-size="34" fill="#27272A" letter-spacing="0.05em">
    UPGRADE
  </text>
  <text x="115" y="92" font-family="'Cormorant Garamond', serif" font-weight="400" font-size="36" font-style="italic" fill="#52525B" letter-spacing="0.08em">
    YOUR <tspan fill="#c41230" font-style="normal" font-weight="700" letter-spacing="0.04em">HEART</tspan>
  </text>
</svg>
